<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>候选池主表 · Manager Playground</title>

  <!-- v1.4: 在 CSS 解析前设置 data-theme，避免 FOUC -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var sysDark = window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (t !== 'light' && sysDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) { /* 隐私模式降级到浅色 */ }
    })();
  </script>

  <!-- v1.5: research-grade typography stack (Noto Serif SC + IBM Plex Sans/Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">

    <!-- ============ Masthead · 非对称布局（左：serif 大标题，右：meta + toggle）============ -->
    <header class="masthead">
      <div class="masthead-left">
        <div class="masthead-eyebrow">量化研究 · 候选池</div>
        <h1 class="masthead-title">Manager <em>Playground</em></h1>
        <p class="masthead-sub">
          <span id="manager-count">0</span> 位在管 ≥10 年公募基金经理
          <span class="sep">·</span>
          数据截至 <span id="data-date">—</span>
          <span class="sep">·</span>
          v1.5 编辑版
        </p>
      </div>
      <div class="masthead-right">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换到深色模式" title="切换到深色模式">
          <span class="theme-toggle-icon theme-toggle-icon--light" aria-hidden="true">🌙</span>
          <span class="theme-toggle-icon theme-toggle-icon--dark" aria-hidden="true">☀</span>
        </button>
      </div>
    </header>

    <hr class="hairline">

    <!-- ============ Block 01 · 候选主表 ============ -->
    <section class="block" id="compare-block">
      <div class="block-head">
        <span class="block-num">01</span>
        <div class="block-head-text">
          <h2 class="block-title">候选主表</h2>
          <span class="block-hint">点击行展开详情</span>
        </div>
      </div>
      <div id="compare-table-container" class="compare-table-container">
        <div class="loading">加载中…</div>
      </div>
    </section>

    <hr class="hairline">

    <!-- ============ Block 02 · 详情 ============ -->
    <section class="block" id="detail-block">
      <div class="block-head">
        <span class="block-num">02</span>
        <div class="block-head-text">
          <h2 class="block-title">详情</h2>
          <span class="block-hint">自上而下：基本信息 / 业绩标签 / 风险回报 / 行业 / 风格 / 持仓 / 基金</span>
        </div>
      </div>
      <div id="detail-container" class="detail-container">
        <div class="empty-state">— 请从主表选择一位经理 —</div>
      </div>
    </section>

    <hr class="hairline">

    <!-- ============ Footer · 微小 colophon ============ -->
    <footer class="colophon">
      <span class="col-mark">— 数据结束 —</span>
      <span class="col-text">资金研究 · 候选池 · 仅供研究使用</span>
    </footer>

  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
